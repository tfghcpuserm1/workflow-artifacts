name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir website
          echo "Hello" > website/index.html

      - uses: actions/upload-artifact@v4
        with:
          name: octomatch
          path: website

  prod:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: prod

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: octomatch
          path: website

      - name: Deploy
        run: |
          echo "Deploying..."